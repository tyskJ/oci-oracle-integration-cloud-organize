<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>メンテナンス中</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #e2e8f0;
        padding: 20px;
      }
      .card {
        width: 100%;
        max-width: 560px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(8px);
        border-radius: 24px;
        padding: 48px 40px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }
      .icon {
        font-size: 60px;
        margin-bottom: 18px;
      }
      h1 {
        font-size: 36px;
        margin-bottom: 16px;
        letter-spacing: 2px;
      }
      p {
        font-size: 16px;
        line-height: 1.9;
        color: #cbd5e1;
        margin-bottom: 14px;
      }
      .note {
        font-size: 14px;
        color: #94a3b8;
        margin-top: 18px;
      }
      .status {
        display: inline-block;
        margin-top: 24px;
        padding: 10px 18px;
        border-radius: 999px;
        background: #f59e0b;
        color: #0f172a;
        font-weight: bold;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">🛠️</div>
      <h1>現在メンテナンス中です</h1>
      <p>
        ただいまシステムメンテナンスを実施しております。<br />
        ご利用のお客様にはご不便をおかけし、誠に申し訳ございません。
      </p>
      <p>サービス再開まで今しばらくお待ちください。</p>
      <div class="status">Maintenance</div>
      <div class="note">
        ※ 作業状況により終了時間が前後する場合がございます。
      </div>
    </div>
  </body>
</html>
